name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/offline.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: offline-challenge-apk
        path: app/build/outputs/apk/debug/offline.apk

    - name: Create or Update Latest Release
      uses: ncipollo/release-action@v1
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      with:
        allowUpdates: true
        artifactErrorsFailBuild: true
        artifacts: "app/build/outputs/apk/debug/offline.apk"
        body: "Automatically built and updated application. / تم بناء وتحديث التطبيق تلقائياً."
        name: "Latest Build (التحديث الأخير)"
        tag: "latest"
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
